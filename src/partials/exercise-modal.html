<div
  class="modal modal-exercise js-modal-exercise-container"
  role="dialog"
  aria-modal="true"
  data-modal-type="exercise"
  hidden
>
  <button
    class="close-btn js-modal-exercise-close"
    type="button"
    aria-label="Close modal"
  >
    <svg class="close-btn-icon" width="24" height="24">
      <use href="./images/icons.svg#icon-close"></use>
    </svg>
  </button>
  <div class="modal-content modal-exercise-content js-modal-exercise-content">
    <div class="modal-overlay modal-error-overlay js-modal-error">
      <p class="loader-text">Error loading exercise. Please try again.</p>
    </div>

    <div class="modal-exercise-card">
      <div class="mcard-image-wrapper">
        <img class="mcard-image js-mcard-image" src="" alt="" />
      </div>

      <div class="mcard-content-wrapper">
        <div class="mcard-header">
          <p class="mcard-exercise-name js-mcard-name"></p>
          <div class="card-rating">
            <span class="rating-value js-mcard-rating"></span>
            <div class="stars-list">
              <svg class="icon-star js-mcard-star" width="18" height="18">
                <use href="./images/icons.svg#icon-star"></use>
              </svg>
              <svg class="icon-star js-mcard-star" width="18" height="18">
                <use href="./images/icons.svg#icon-star"></use>
              </svg>
              <svg class="icon-star js-mcard-star" width="18" height="18">
                <use href="./images/icons.svg#icon-star"></use>
              </svg>
              <svg class="icon-star js-mcard-star" width="18" height="18">
                <use href="./images/icons.svg#icon-star"></use>
              </svg>
              <svg class="icon-star js-mcard-star" width="18" height="18">
                <use href="./images/icons.svg#icon-star"></use>
              </svg>
            </div>
          </div>
        </div>

        <ul class="mcard-meta-list">
          <li class="mcard-meta-item">
            <span class="mcard-meta-label">Target</span
            ><span class="mcard-meta-value js-mcard-target"></span>
          </li>
          <li class="mcard-meta-item">
            <span class="mcard-meta-label">Body Part</span
            ><span class="mcard-meta-value js-mcard-body-part"></span>
          </li>
          <li class="mcard-meta-item">
            <span class="mcard-meta-label">Equipment</span
            ><span class="mcard-meta-value js-mcard-equipment"></span>
          </li>
          <li class="mcard-meta-item">
            <span class="mcard-meta-label">Popular</span
            ><span class="mcard-meta-value js-mcard-popularity"></span>
          </li>
          <li class="mcard-meta-item">
            <span class="mcard-meta-label">Burned Calories</span
            ><span class="mcard-meta-value js-mcard-burned-calories"></span>
          </li>
        </ul>

        <p class="mcard-description js-mcard-description"></p>
      </div>

      <div class="mcard-actions">
        <button
          type="button"
          class="btn btn-white btn-favorites js-btn-favorites"
        >
          <span class="js-fav-btn-text">Add to favorites</span>
          <svg class="btn-icon" width="20" height="20">
            <use href="./images/icons.svg#icon-heart" class="js-fav-icon" />
          </svg>
        </button>
        <button type="button" class="btn btn-black btn-rating js-btn-rating">
          Give a rating
        </button>
      </div>
    </div>
  </div>
</div>
