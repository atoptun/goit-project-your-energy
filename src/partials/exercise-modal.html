<div
  class="modal modal-exercise js-modal-exercise-container"
  role="dialog"
  aria-modal="true"
  data-modal-type="exercise"
  hidden
>
  <button
    class="close-btn js-modal-close"
    type="button"
    aria-label="Close modal"
  >
    <svg class="close-btn-icon" width="24" height="24">
      <use href="./images/icons.svg#icon-close"></use>
    </svg>
  </button>
  <div
    class="modal-content modal-exercise-content js-modal-exercise-content"
  ></div>
</div>
