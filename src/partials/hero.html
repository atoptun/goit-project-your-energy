<section class="hero">
  <div class="container hero-container">
      <h1 class="hero-title">
        <svg class="hero-icon" width="38" height="38">
        <use href="./images/icons.svg#sun"></use>
        </svg>
        Get <span>Body</span> in shape, Stay healthy
      </h1>
      <p class="hero-text">
      Transform your physique and embrace a healthier lifestyle with our
      comprehensive fitness and nutrition support.
    </p>

    <img class="hero-side-image"
      srcset="./images/hero-legs@2x.jpg 2x"
      src="./images/hero-legs.jpg"
      alt="Women stretching"
      width="168"
      height="100"
    />

    <picture class="hero-picture">
      <source
        srcset="./images/hero-desktop.jpg 1x, ./images/hero-desktop@2x.jpg 2x"
        media="(min-width: 1440px)"
        />
      <source
        srcset="./images/hero-tablet.jpg 1x, ./images/hero-tablet@2x.jpg 2x"
        media="(min-width: 768px)"
        />

      <img class="hero-main-image"
      srcset="./images/hero-mobile.jpg 1x, ./images/hero-mobile@2x.jpg 2x"
      src="./images/hero-mobile.jpg"
      alt="Women training together"
      width="336"
      height="460"
      fetchpriority="high"
      />

    </picture>

    <ul class="hero-tags">
      <li class="hero-tag"><a href="#">#Sport</a></li>
      <li class="hero-tag"><a href="#">#Healthy</a></li>
      <li class="hero-tag"><a href="#">#Workout</a></li>
      <li class="hero-tag"><a href="#">#Diet</a></li>
    </ul>
  </div>
</section>
