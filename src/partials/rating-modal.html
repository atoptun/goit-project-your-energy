<div
  class="modal modal-rating js-modal-rating-container"
  role="dialog"
  aria-modal="true"
  data-modal-type="rating"
  hidden
>
  <button
    class="close-btn js-modal-rating-close"
    type="button"
    aria-label="Close modal"
  >
    <svg class="close-btn-icon" width="24" height="24">
      <use href="./images/icons.svg#icon-close"></use>
    </svg>
  </button>
  <div class="modal-content modal-rating-content js-modal-rating-content">
    <div class="form-loader-overlay">
      <div class="loader-spinner"></div>
      <p class="loader-text">Sending your review...</p>
    </div>

    <form class="rating-form js-send-rating-form" autocomplete="off">
      <div class="rating-wrapper">
        <p class="rating-label">Rating</p>

        <div class="rating-stars-container">
          <span class="rating-numeric-value js-rating-value">0.0</span>

          <div class="rating-stars-group">
            <input
              class="visually-hidden"
              type="radio"
              id="star5"
              name="rate"
              value="5"
              required
            />
            <label for="star5" class="star-label" title="5 stars">
              <svg class="icon-star-rating" width="18" height="18">
                <use href="./images/icons.svg#icon-star"></use>
              </svg>
            </label>

            <input
              class="visually-hidden"
              type="radio"
              id="star4"
              name="rate"
              value="4"
            />
            <label for="star4" class="star-label" title="4 stars">
              <svg class="icon-star-rating" width="18" height="18">
                <use href="./images/icons.svg#icon-star"></use>
              </svg>
            </label>

            <input
              class="visually-hidden"
              type="radio"
              id="star3"
              name="rate"
              value="3"
            />
            <label for="star3" class="star-label" title="3 stars">
              <svg class="icon-star-rating" width="18" height="18">
                <use href="./images/icons.svg#icon-star"></use>
              </svg>
            </label>

            <input
              class="visually-hidden"
              type="radio"
              id="star2"
              name="rate"
              value="2"
            />
            <label for="star2" class="star-label" title="2 stars">
              <svg class="icon-star-rating" width="18" height="18">
                <use href="./images/icons.svg#icon-star"></use>
              </svg>
            </label>

            <input
              class="visually-hidden"
              type="radio"
              id="star1"
              name="rate"
              value="1"
            />
            <label for="star1" class="star-label" title="1 star">
              <svg class="icon-star-rating" width="18" height="18">
                <use href="./images/icons.svg#icon-star"></use>
              </svg>
            </label>
          </div>
        </div>
      </div>

      <div class="rating-inputs-container">
        <input
          class="rating-input"
          type="email"
          name="email"
          placeholder="Email"
          required
          pattern="^\w+(\.\w+)?@[a-zA-Z_]+?\.[a-zA-Z]{2,3}$"
        />

        <textarea
          class="rating-textarea"
          name="review"
          placeholder="Your comment"
          required
        ></textarea>
      </div>

      <button class="btn btn-white btn-rating-submit" type="submit">
        Send
      </button>
    </form>
  </div>
</div>
